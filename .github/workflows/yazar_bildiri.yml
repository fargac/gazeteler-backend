name: Yazar Bildirimleri

on:
  schedule:
     # Her 3 saatte bir kontrol eder
     - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  send-author-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install requests beautifulsoup4 lxml firebase-admin

      - name: Bildirimleri gönder
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python scripts/yazar_bildiri.py