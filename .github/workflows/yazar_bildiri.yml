name: Yazar Bildirimleri

on:
  schedule:
    # 🔥 BEST PRACTICE: Github Actions UTC zaman dilimi kullanır (TR saati = UTC + 3)
    # 04:30 UTC -> 07:30 TR Saati
    # 08:30 UTC -> 11:30 TR Saati
    # 12:30 UTC -> 15:30 TR Saati
    # 16:30 UTC -> 19:30 TR Saati
    # Bu ayar sayesinde gece 19:30'dan ertesi sabah 07:30'a kadar SIFIR bildirim gider (Quiet Hours).
    - cron: '30 4,8,12,16 * * *'
  workflow_dispatch:

jobs:
  send-author-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install requests beautifulsoup4 lxml firebase-admin

      - name: Bildirimleri gönder
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python scripts/yazar_bildiri.py