# .github/workflows/db_cleanup.yml
name: Veritabanı Temizliği (Garbage Collector)

on:
  schedule:
    # ⚠️ GitHub UTC saatini kullanır. Türkiye (UTC+3) saatiyle 00:00'da 
    # çalışması için UTC saatiyle 21:00 yazmalıyız.
    #- cron: '0 21 * * *' 3 ay sonra aç burayı
  workflow_dispatch: # İstediğin zaman GitHub'dan tek tıkla manuel çalıştırmak için

jobs:
  run-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # İşlem 5 dakikayı geçerse otomatik iptal et (Güvenlik)
    
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri Yükle
        run: pip install firebase-admin

      - name: Temizlik Botunu Çalıştır
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python scripts/db_cleanup.py
