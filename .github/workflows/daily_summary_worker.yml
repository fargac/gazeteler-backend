name: Gezo Gündem Günün Özeti Otomasyonu

on:
  workflow_dispatch:

permissions:
  contents: write # 🔥 YENİ: Commit atabilmek için izin gerekli

jobs:
  run-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri Yükle
        run: pip install firebase-admin google-genai feedparser python-dateutil

      - name: Günün Özetini Hazırla ve Diske Yaz
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/daily_summary.py

      - name: Yeni Özeti Github'a Pushla (CDN için)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📝 feat(cdn): Günün Özeti eklendi"
          file_pattern: 'cdn_data/summaries/*.json'