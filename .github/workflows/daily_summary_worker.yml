name: Gezo Gündem Günün Özeti Otomasyonu

on:
  schedule:
    # Türkiye saatiyle 21:00'da çalışması için UTC saati (18:00) ayarlandı.
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri Yükle
        run: |
          pip install firebase-admin google-genai feedparser python-dateutil

      - name: Günün Özetini Hazırla ve Gönder
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/daily_summary.py