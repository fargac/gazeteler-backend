# .github/workflows/build-cdn.yml
name: Build CDN JSONs

on:
  push:
    paths:
      - 'data/**'      # Sadece data klasöründe değişiklik olduğunda çalışır
      - 'scripts/build_cdn.py'
    branches:
      - main

permissions:
  contents: write      # GitHub'ın repoya JSON dosyalarını yazabilmesi için izin

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        
      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: CDN Scriptini Çalıştır
        run: python scripts/build_cdn.py
        
      - name: Değişiklikleri Commit Et ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cdn_data/
          # Eğer değişiklik yoksa hata vermemesi için diff-index kontrolü yapıyoruz
          git diff-index --quiet HEAD || git commit -m "chore: Auto-generate CDN JSON dosyaları"
          git push
