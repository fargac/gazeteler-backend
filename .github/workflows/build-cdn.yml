# .github/workflows/build-cdn.yml
name: Build CDN JSONs

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/build_cdn.py'
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        
      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: CDN Scriptini Çalıştır
        run: python scripts/build_cdn.py
        
      - name: Değişiklikleri Commit Et ve Pushla
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cdn_data/
          if git diff-index --quiet HEAD; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "chore: Auto-generate CDN JSON dosyaları"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: jsDelivr Cache Temizle
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -s "https://purge.jsdelivr.net/gh/fargac/gazeteler-backend@main/cdn_data/version.json"
          curl -s "https://purge.jsdelivr.net/gh/fargac/gazeteler-backend@main/cdn_data/config.json"
          echo "✅ CDN Önbelleği temizlendi!"
